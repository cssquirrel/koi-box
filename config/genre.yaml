        lyrics: |
          [Instrumental]
          [Intro]
          [Rain ambience fades in slowly, followed by a distant felt piano chord, long reverb tail]

          [Verse]
          [Fingerpicked nylon guitar begins a slow arpeggio in E minor, very gentle brush snare on beat 3, sub bass swells in underneath with slow attack]

          [Chorus]
          [Felt piano doubles the guitar chords softly, a breathy wooden flute plays a slow melodic line, rain ambience continues throughout]

          [Instrumental Break]
