      ginza-jazz:
        description: >
          Slow sophisticated jazz-vocal city pop with acoustic piano
          and Rhodes trading phrases, warm saxophone melodies, walking
          upright bass, brushed jazz drums with swing feel, and subtle
          string arrangements. Taeko Ohnuki and Minako Yoshida territory.
          Restrained, harmonically rich, quiet storm elegance.
        prefix: ginza-jazz
        caption: >-
          city pop, japanese pop, 80s, jazz vocal, sophisticated, slow,
          smooth, elegant, quiet storm, female vocal, japanese vocal,
          acoustic piano, Rhodes electric piano, saxophone, alto saxophone,
          walking upright bass, brushed drums, jazz drums, swing feel,
          string arrangement, flute, warm, lush chords, extended chords,
          major seventh, ninth chords, polished, intimate, gentle melody
        dynamic_lyrics: true
        lyrics_guidance: >-
          MOOD: Sophisticated, restrained, elegant, contemplative, tender.
          THEMES: Quiet reflection, graceful solitude, bittersweet acceptance, inner poise.
          IMAGERY: Grand piano in an empty room, silk, candlelight, wine, slow rain, velvet.
          Lines should feel unhurried — slightly longer phrasing (6-9 morae) suits the slower tempo.
        lyrics: |
          [Intro - acoustic piano chords, bass walks in gently]

          [Verse 1]
          {THEME_SEED}
          {LYRICS_VERSE_1_LINE_2}
          {LYRICS_VERSE_1_LINE_3}
          {LYRICS_VERSE_1_LINE_4}

          [Chorus - saxophone enters, warm and open]
          {LYRICS_CHORUS_LINE_1}
