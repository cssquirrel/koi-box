<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Cream device background -->
  <rect width="512" height="512" rx="108" fill="#F5F0E8"/>
  <rect x="4" y="4" width="504" height="504" rx="104" fill="none" stroke="#D4D0C8" stroke-width="4"/>

  <!-- OLED screen -->
  <rect x="64" y="64" width="384" height="120" rx="16" fill="#1A1A1A"/>

  <!-- Waveform bars — played (accent) then unplayed (dim) -->
  <rect x="120" y="100" width="24" height="60" rx="5" fill="#FF5B1A"/>
  <rect x="156" y="86"  width="24" height="74" rx="5" fill="#FF5B1A"/>
  <rect x="192" y="96"  width="24" height="64" rx="5" fill="#FF5B1A"/>
  <rect x="228" y="108" width="24" height="52" rx="5" fill="#FF5B1A"/>
  <rect x="264" y="100" width="24" height="60" rx="5" fill="#3A3835"/>
  <rect x="300" y="92"  width="24" height="68" rx="5" fill="#3A3835"/>
  <rect x="336" y="104" width="24" height="56" rx="5" fill="#3A3835"/>
  <rect x="372" y="112" width="24" height="48" rx="5" fill="#3A3835"/>

  <!-- Speaker grille rings -->
  <circle cx="256" cy="325" r="115" fill="none" stroke="#AAA5A0" stroke-width="20"/>
  <circle cx="256" cy="325" r="72"  fill="none" stroke="#C8C4BC" stroke-width="14"/>
  <circle cx="256" cy="325" r="32"  fill="none" stroke="#D4D0C8" stroke-width="10"/>
  <circle cx="256" cy="325" r="10"  fill="#AAA5A0"/>
</svg>
